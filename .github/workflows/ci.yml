name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas requests

      - name: Compile Python sources
        run: python -m compileall app.py data_fetch.py map_dashboard ingestion pages scrap.py tests

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Validate offline station dataset
        run: python -m ingestion.sync_stations --offline --check
