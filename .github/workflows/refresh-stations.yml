name: Refresh Station Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ingestion dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Refresh station data
        run: python -m ingestion.sync_stations

      - name: Run ingestion tests
        run: python -m unittest discover -s tests

      - name: Commit refreshed station data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh station data"
          file_pattern: data/stations_clean.json data/stations_rejected.json
